name: CI

on:
  push:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  test:
    # This job name is the required status check context in
    # .github/rulesets/ruleset-main.json — keep them in sync.
    name: Build & Test
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        # actions/checkout v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install Lua
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends lua5.4

      - name: Unit tests + integration harness
        run: make check LUA=lua5.4
